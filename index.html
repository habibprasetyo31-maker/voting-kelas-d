<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2 id="title">Memuat...</h2>

  <input id="nim" placeholder="Masukkan NIM">
  <button id="btnCek">Lanjut</button>

  <div id="kandidat" style="margin-top:15px;"></div>
</div>

<script type="module">
import { db, ref, onValue } from "./firebase.js";
import { runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let currentVotingId = null;
let currentNim = null;
let votingOpen = true;

const kandidatDiv = document.getElementById("kandidat");

// ================= SETTINGS =================
onValue(ref(db, "settings"), (snap) => {
  const data = snap.val();
  if (!data) return;

  votingOpen = data.votingOpen;
  currentVotingId = data.votingId;

  const savedVotingId = localStorage.getItem("votingId");

  if (savedVotingId !== String(currentVotingId)) {
    localStorage.removeItem("locked");
  }
});

// ================= TITLE =================
onValue(ref(db, "settings/title"), (snap) => {
  document.getElementById("title").textContent = snap.val() || "Voting";
});

// ================= CEK NIM =================
document.getElementById("btnCek").onclick = () => {

  if (!votingOpen) {
    alert("Voting ditutup");
    return;
  }

  const nim = document.getElementById("nim").value.trim();

  if (!/^[0-9]+$/.test(nim)) {
    alert("NIM harus angka");
    return;
  }

  if (localStorage.getItem("locked") === "true") {
    document.body.innerHTML = "<div class='card'><h2>Anda sudah voting</h2></div>";
    return;
  }

  currentNim = nim;
  loadKandidat();
};

// ================= LOAD KANDIDAT =================
function loadKandidat() {
  onValue(ref(db, "candidates"), (snapshot) => {
    const data = snapshot.val();
    kandidatDiv.innerHTML = "<h3>Pilih Kandidat</h3>";

    if (!data) {
      kandidatDiv.innerHTML += "<p>Belum ada kandidat</p>";
      return;
    }

    Object.keys(data).forEach((id) => {
      const btn = document.createElement("button");
      btn.textContent = data[id].name;
      btn.style.display = "block";
      btn.style.margin = "8px 0";

      btn.onclick = () => vote(id);
      kandidatDiv.appendChild(btn);
    });
  });
}

// ================= VOTE =================
async function vote(id) {

  if (!votingOpen) {
    alert("Voting ditutup");
    return;
  }

  if (!currentNim) {
    alert("Masukkan NIM dulu");
    return;
  }

  try {
    const userRef = ref(db, "users/" + currentVotingId + "/" + currentNim);

    const result = await runTransaction(userRef, (data) => {
      if (data === null) return true;
      return;
    });

    if (!result.committed) {
      alert("NIM sudah digunakan!");
      return;
    }

    const voteRef = ref(db, "results/" + currentVotingId + "/" + id);

    await runTransaction(voteRef, (current) => (current || 0) + 1);

    localStorage.setItem("locked", "true");
    localStorage.setItem("votingId", currentVotingId);

    document.body.innerHTML = "<div class='card'><h2>Terima kasih sudah voting ✅</h2></div>";

  } catch (e) {
    console.error(e);
    alert("Terjadi kesalahan!");
  }
}
</script>

</body>
</html>
