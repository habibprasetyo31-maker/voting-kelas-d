<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Voting</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
  <h2>Admin Panel Voting</h2>

  <h3>Status Voting</h3>
  <button onclick="openVoting()">🔓 Buka Voting</button>
  <button onclick="closeVoting()">🔒 Tutup Voting</button>

  <hr>

  <h3>Judul Voting</h3>
  <input type="text" id="newTitle" placeholder="Masukkan judul baru">
  <button onclick="updateTitle()">Update Judul</button>

  <hr>

  <h3>Tambah Kandidat</h3>
  <input type="text" id="candidateName" placeholder="Nama kandidat">
  <button onclick="addCandidate()">Tambah Kandidat</button>

  <h3>Daftar Kandidat</h3>
  <div id="candidateList"></div>

  <hr>

  <h3>Hasil Voting (Ranking)</h3>
  <div id="hasil"></div>

  <hr>

  <button onclick="resetVoting()">♻️ Mulai Voting Baru</button>
</div>

<script type="module">
import { db, ref, set, get, update, remove, onValue, push } from "./firebase.js";

let currentVotingId = null;

// ================= STATUS =================
window.openVoting = async () => {
  await update(ref(db, "settings"), { votingOpen: true });
  alert("Voting dibuka!");
};

window.closeVoting = async () => {
  await update(ref(db, "settings"), { votingOpen: false });
  alert("Voting ditutup!");
};

// ================= LOAD SETTINGS =================
onValue(ref(db, "settings"), (snap) => {
  const data = snap.val();
  if (!data) return;
  currentVotingId = data.votingId;
});

// ================= KANDIDAT =================
const candidateList = document.getElementById("candidateList");

onValue(ref(db, "candidates"), (snapshot) => {
  const data = snapshot.val();
  candidateList.innerHTML = "";

  if (!data) {
    candidateList.innerHTML = "<p>Belum ada kandidat.</p>";
    return;
  }

  Object.keys(data).forEach((id) => {
    const div = document.createElement("div");
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <strong>${data[id].name}</strong>
      <button class="edit">Edit</button>
      <button class="delete">Hapus</button>
    `;

    div.querySelector(".edit").onclick = () => editCandidate(id, data[id].name);
    div.querySelector(".delete").onclick = () => deleteCandidate(id);

    candidateList.appendChild(div);
  });
});

// ================= HASIL =================
const hasilDiv = document.getElementById("hasil");

onValue(ref(db, "results"), async (snapshot) => {
  const allResults = snapshot.val();
  hasilDiv.innerHTML = "";

  if (!allResults || !currentVotingId || !allResults[currentVotingId]) {
    hasilDiv.innerHTML = "<p>Belum ada hasil voting.</p>";
    return;
  }

  const results = allResults[currentVotingId];

  const candidateSnapshot = await get(ref(db, "candidates"));
  const candidates = candidateSnapshot.val();
  if (!candidates) return;

  let rankingData = [];

  Object.keys(results).forEach((id) => {
    if (candidates[id]) {
      rankingData.push({
        name: candidates[id].name,
        votes: results[id]
      });
    }
  });

  rankingData.sort((a, b) => b.votes - a.votes);

  rankingData.forEach((item, index) => {
    let medal = "";
    let bgColor = "#fff";

    if (index === 0) { medal = "🥇"; bgColor = "#ffeaa7"; }
    else if (index === 1) { medal = "🥈"; bgColor = "#dfe6e9"; }
    else if (index === 2) { medal = "🥉"; bgColor = "#fab1a0"; }

    const div = document.createElement("div");
    div.style.background = bgColor;
    div.style.padding = "10px";
    div.style.marginBottom = "8px";
    div.style.borderRadius = "8px";

    div.innerHTML = `
      ${medal} Ranking ${index + 1}<br>
      ${item.name}<br>
      ${item.votes} suara
    `;

    hasilDiv.appendChild(div);
  });
});

// ================= JUDUL =================
window.updateTitle = async () => {
  const title = document.getElementById("newTitle").value;
  if (!title) return alert("Judul tidak boleh kosong!");

  await set(ref(db, "settings/title"), title);
  alert("Judul diperbarui!");
};

// ================= TAMBAH =================
window.addCandidate = async () => {
  const name = document.getElementById("candidateName").value;
  if (!name) return alert("Nama tidak boleh kosong!");

  const newRef = push(ref(db, "candidates"));
  await set(newRef, { name });

  document.getElementById("candidateName").value = "";
  alert("Kandidat ditambahkan!");
};

// ================= EDIT =================
window.editCandidate = async (id, oldName) => {
  const newName = prompt("Edit nama:", oldName);
  if (!newName) return;

  await update(ref(db, "candidates/" + id), { name: newName });
};

// ================= HAPUS =================
window.deleteCandidate = async (id) => {
  if (!confirm("Hapus kandidat?")) return;

  await remove(ref(db, "candidates/" + id));
};

// ================= RESET =================
window.resetVoting = async () => {
  if (!confirm("Mulai voting baru?")) return;

  const newVotingId = Date.now();

  await update(ref(db, "settings"), {
    votingOpen: true,
    votingId: newVotingId
  });

  alert("Voting baru dimulai!");
};
</script>

</body>
</html>
